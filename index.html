<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartera Equino</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white p-6 md:p-8 rounded-2xl shadow-xl border border-slate-200">
        <h1 class="text-3xl md:text-4xl font-extrabold text-slate-900 tracking-tight text-center">CARTERA EQUINO</h1>
        <p id="status" class="mt-4 text-green-600 font-bold text-center">Datos cargados exitosamente.</p>
        
        <div id="data-container" class="mt-8 overflow-x-auto">
            <!-- La tabla se cargará aquí -->
        </div>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTvS_GNlePDLV0i10lt51vBawTRbEWfprJ_-eKsnsy-AQbt_6fY-Mabz0jhSQ8lmfL4ltG7BJyRCgQo/pub?output=csv";

        async function loadData() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').filter(row => row.trim() !== '');
                
                const container = document.getElementById('data-container');
                
                let html = '<table class="w-full text-left border-collapse">';
                
                rows.forEach((row, index) => {
                    // Separamos por comas considerando posibles comillas
                    const cells = row.split(',').map(cell => cell.replace(/^"|"$/g, ''));
                    
                    if (index === 0) {
                        html += '<thead class="bg-slate-100 border-b-2 border-slate-200">';
                        html += '<tr>';
                        cells.forEach(header => html += `<th class="p-4 font-bold text-slate-700">${header}</th>`);
                        html += '</tr></thead><tbody>';
                    } else {
                        html += '<tr class="border-b hover:bg-slate-50">';
                        cells.forEach(cell => html += `<td class="p-4 text-sm text-slate-600">${cell}</td>`);
                        html += '</tr>';
                    }
                });
                
                html += '</tbody></table>';
                container.innerHTML = html;
            } catch (err) {
                document.getElementById('status').innerText = "Error al cargar los datos.";
                document.getElementById('status').className = "mt-4 text-red-600 font-bold text-center";
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
