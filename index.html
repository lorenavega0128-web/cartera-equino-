<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartera Equino</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { PieChart, AlertCircle, FileJson, BarChart3, CheckCircle2 } = lucide;

        function App() {
            const [status, setStatus] = useState("Cargando...");

            useEffect(() => {
                // Simulamos una carga exitosa para confirmar que todo funciona
                setTimeout(() => {
                    setStatus("App conectada y operativa ✅");
                }, 1000);
            }, []);

            return (
                <div className="min-h-screen p-6 flex items-center justify-center">
                    <div className="bg-white p-10 rounded-2xl shadow-xl text-center border border-slate-200">
                        <div className="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                            <CheckCircle2 className="w-8 h-8 text-green-600" />
                        </div>
                        <h1 className="text-3xl font-bold text-slate-900">CARTERA EQUINO</h1>
                        <p className="text-slate-600 mt-4">Sistema cargado correctamente.</p>
                        <div className="mt-6 p-4 bg-green-50 text-green-700 rounded-lg font-medium">
                            {status}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
