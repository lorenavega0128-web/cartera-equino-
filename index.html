<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartera Equino - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
          const [data, setData] = useState(null);
          const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRqllr02inUvRyJuHOKiX8lc8XTolV9iQQ7Vo6-uzfANrwDLeKEE5w1WukZfz8iBw/pub?output=csv";

          const csvToArray = (str) => {
            const rows = str.split('\n').map(row => row.split(',').map(cell => cell.trim()));
            return rows.filter(r => r.length > 1);
          };

          const parseAmount = (val) => parseFloat(val?.toString().replace(/[$\s.]/g, '').replace(',', '.') || 0);

          const processData = (rawData) => {
            const headers = rawData[0].map(h => h.toLowerCase());
            const rows = rawData.slice(1);
            
            let clientes_juridico = [];

            rows.forEach(row => {
              const obj = {};
              headers.forEach((h, i) => obj[h] = row[i]);
              
              // Lógica: Si el "estado" o "proceso" indica algo diferente a 'Normal'
              const estado = obj['estado'] || '';
              const proceso = obj['proceso'] || 'Sin detalle';
              const valor = parseAmount(obj['valor']);
              
              if (estado.toLowerCase().includes('jur') || estado.toLowerCase().includes('legal')) {
                clientes_juridico.push({
                  cliente: obj['cliente'] || 'N/A',
                  valor: valor,
                  proceso: proceso // AQUÍ ESTÁ TU NUEVA COLUMNA
                });
              }
            });

            return { clientes_juridico };
          };

          const fetchData = async () => {
            const response = await fetch(CSV_URL);
            const text = await response.text();
            setData(processData(csvToArray(text)));
          };

          useEffect(() => { fetchData(); }, []);

          if (!data) return <div className="p-10 text-center">Cargando datos...</div>;

          return (
            <div className="p-8">
              <h2 className="text-2xl font-bold mb-6">Estado Jurídico</h2>
              <div className="bg-white rounded-xl shadow overflow-hidden">
                <table className="w-full text-left">
                  <thead className="bg-slate-100">
                    <tr>
                      <th className="p-4">Cliente</th>
                      <th className="p-4">Deuda</th>
                      <th className="p-4 text-blue-700 font-bold">Detalle del Proceso</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y">
                    {data.clientes_juridico.map((c, i) => (
                      <tr key={i}>
                        <td className="p-4">{c.cliente}</td>
                        <td className="p-4">${c.valor.toLocaleString()}</td>
                        <td className="p-4 font-bold text-blue-600 bg-blue-50">{c.proceso}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
