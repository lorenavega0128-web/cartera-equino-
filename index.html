            let p = '', row = [''], ret = [row], i = 0, r = 0, s = !0, l;

              } else row[i] += l;
              p = l;
            }
            return ret.filter(r => r.length > 0 && r[0] !== '');
          }

            if (!val) return 0;

            if (lastComma > lastDot) {
              s = s.replace(/\./g, '').replace(',', '.');
            } else if (lastDot > lastComma) {
              s = s.replace(/,/g, '');
            }
            return parseFloat(s) || 0;
          }
