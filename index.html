<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartera Equino - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, PieChart, Pie, Cell } = window.Recharts;

        const datosCartera = [
            { cliente: '2H INGENIERIA Y CONSTRUCCION SAS', valor: 89740, doc: 'FV 7.330', fecha: '17/02/2026' },
            { cliente: '6M INGENIERIA S.A.S', valor: 419550, doc: 'FV 7.975', fecha: '05/05/2026' },
            { cliente: 'ABC INGENIERIA & MATERIALES S.A.S', valor: 1709269, doc: 'FV 5.652', fecha: '24/07/2025' },
            { cliente: 'ABC INGENIERIA & MATERIALES S.A.S', valor: 85215, doc: 'FV 5.564', fecha: '17/07/2025' }
        ];

        const COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444'];

        function App() {
            return (
                <div className="max-w-7xl mx-auto space-y-6 font-sans">
                    <header className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center">
                        <div>
                            <h1 className="text-3xl font-extrabold text-slate-800">CARTERA EQUINO</h1>
                            <p className="text-slate-500">Panel de Control y Análisis Comercial</p>
                        </div>
                        <div className="flex items-center space-x-2 bg-green-50 px-3 py-1 rounded-full border border-green-200">
                            <span className="flex h-3 w-3 rounded-full bg-green-500"></span>
                            <span className="text-sm font-medium text-green-700">Sistema en línea</span>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-blue-500">
                            <h3 className="text-sm font-medium text-slate-500">Cartera Total Vencida</h3>
                            <p className="text-3xl font-bold text-slate-800 mt-2">$2,303,774</p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-red-500">
                            <h3 className="text-sm font-medium text-slate-500">Facturas en Mora</h3>
                            <p className="text-3xl font-bold text-slate-800 mt-2">4</p>
                        </div>
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200 border-l-4 border-l-orange-500">
                            <h3 className="text-sm font-medium text-slate-500">Mayor Deuda</h3>
                            <p className="text-xl font-bold text-slate-800 mt-2">ABC INGENIERIA</p>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <h3 className="text-lg font-bold text-slate-800 mb-6">Deuda por Cliente</h3>
                            <div className="h-72">
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={datosCartera}>
                                        <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                        <XAxis dataKey="cliente" tick={{fontSize: 10}} />
                                        <YAxis tick={{fontSize: 12}} />
                                        <Tooltip formatter={(value) => `$${value.toLocaleString()}`} />
                                        <Bar dataKey="valor" fill="#3b82f6" radius={[4, 4, 0, 0]} />
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                            <h3 className="text-lg font-bold text-slate-800 mb-6">Distribución de Cartera</h3>
                            <div className="h-72">
                                <ResponsiveContainer width="100%" height="100%">
                                    <PieChart>
                                        <Pie data={datosCartera} cx="50%" cy="50%" innerRadius={60} outerRadius={100} paddingAngle={5} dataKey="valor">
                                            {datosCartera.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={COLORS[index % COLORS.length]} />
                                            ))}
                                        </Pie>
                                        <Tooltip formatter={(value) => `$${value.toLocaleString()}`} />
                                        <Legend />
                                    </PieChart>
                                </ResponsiveContainer>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div className="px-6 py-4 border-b border-slate-200">
                            <h3 className="text-lg font-bold text-slate-800">Detalle de Facturas</h3>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-sm text-left">
                                <thead className="bg-slate-50 text-slate-600 font-medium">
                                    <tr>
                                        <th className="px-6 py-3">Cliente</th>
                                        <th className="px-6 py-3">Documento</th>
                                        <th className="px-6 py-3">Fecha</th>
                                        <th className="px-6 py-3">Valor Total</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-200">
                                    {datosCartera.map((fila, i) => (
                                        <tr key={i} className="hover:bg-slate-50">
                                            <td className="px-6 py-4 font-medium text-slate-800">{fila.cliente}</td>
                                            <td className="px-6 py-4">{fila.doc}</td>
                                            <td className="px-6 py-4">{fila.fecha}</td>
                                            <td className="px-6 py-4 font-bold text-slate-700">${fila.valor.toLocaleString()}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
