<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartera Equino - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
</head>
<body class="bg-slate-50 p-8">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { RefreshCw, FileJson, PieChart, Scale, AlertCircle, BarChart3, AlertOctagon } = { 
            RefreshCw: () => <span className="font-bold">↻</span>,
            FileJson: () => <span>📄</span>,
            PieChart: () => <span>📊</span>,
            Scale: () => <span>⚖️</span>,
            AlertCircle: () => <span>⚠️</span>,
            BarChart3: () => <span>📈</span>,
            AlertOctagon: () => <span>🛑</span>
        };

        function App() {
            const [data, setData] = useState(null);
            
            // Función procesar datos con la nueva columna 'proceso'
            const processData = (rawData) => {
                const headers = rawData[0].map(h => h.toLowerCase().trim());
                const rows = rawData.slice(1);
                let juridicos = rows.map(row => {
                    const obj = {};
                    headers.forEach((h, i) => obj[h] = row[i]);
                    return {
                        cliente: obj['cliente'] || 'N/A',
                        valor: parseFloat(obj['valor']?.replace(/[^0-9]/g, '') || 0),
                        mora: parseInt(obj['mora'] || 0),
                        proceso: obj['proceso'] || 'En trámite' // <--- AQUÍ CAPTURA EL PROCESO
                    };
                }).filter(r => r.valor > 0);

                return { juridicos: juridicos.filter(r => r.mora > 30) }; // Ejemplo filtro
            };

            useEffect(() => {
                fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRqllr02inUvRyJuHOKiX8lc8XTolV9iQQ7Vo6-uzfANrwDLeKEE5w1WukZfz8iBw/pub?output=csv")
                .then(res => res.text())
                .then(text => {
                    const rows = text.split('\n').map(r => r.split(','));
                    setData(processData(rows));
                });
            }, []);

            if (!data) return <div>Cargando sistema...</div>;

            return (
                <div className="max-w-6xl mx-auto">
                    <h2 className="text-3xl font-bold mb-6">Estado Jurídico</h2>
                    <div className="bg-white rounded-xl shadow border overflow-hidden">
                        <table className="w-full text-left">
                            <thead className="bg-slate-100">
                                <tr>
                                    <th className="p-4">Cliente</th>
                                    <th className="p-4">Valor Deuda</th>
                                    <th className="p-4 text-blue-700">Detalle del Proceso</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y">
                                {data.juridicos.map((c, i) => (
                                    <tr key={i} className="hover:bg-slate-50">
                                        <td className="p-4 font-bold">{c.cliente}</td>
                                        <td className="p-4">${c.valor.toLocaleString()}</td>
                                        <td className="p-4">
                                            <span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full font-bold">
                                                {c.proceso}
                                            </span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
